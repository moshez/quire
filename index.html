<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quire</title>
  <meta name="theme-color" content="#fafaf8">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="reader.css">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div id="app">
    <div class="quire-loading">
      <div class="spinner"></div>
      <div class="app-name">Quire</div>
    </div>
  </div>
  <script type="module">
    import { loadWard } from './vendor/ward/lib/ward_bridge.mjs';
    const root = document.getElementById('app');
    const resp = await fetch('quire.wasm');
    const bytes = await resp.arrayBuffer();
    let wardNodes = null;
    let wasmMem = null;
    let wardExports = null;
    const { exports, nodes } = await loadWard(bytes, root, {
      extraImports: {
        quireSetTitle(mode) {
          document.title = mode ? 'Quire (importing)' : 'Quire';
        },
        quire_time_now() {
          return Math.floor(Date.now() / 1000);
        },
        quire_factory_reset() {
          indexedDB.deleteDatabase('ward');
          location.reload();
        },
        quire_get_dark_mode() {
          try {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 1 : 0;
          } catch(e) { return 0; }
        },
        quire_setup_link_handler(containerNodeId) {
          // Intercept link clicks: external links open in new tab,
          // footnote links (epub:type=noteref) prevent default for popup.
          if (!wardNodes) return;
          const container = wardNodes.get(containerNodeId);
          if (!container) return;
          container.addEventListener('click', (e) => {
            const link = e.target.closest('a[href]');
            if (!link) return;
            const href = link.getAttribute('href');
            if (!href) return;
            if (href.startsWith('http://') || href.startsWith('https://')) {
              e.preventDefault();
              window.open(href, '_blank', 'noopener');
            }
            if (link.getAttribute('epub:type') === 'noteref') {
              e.preventDefault();
            }
          });
        },
        quire_get_input_value(nodeId, destPtr, destMaxLen) {
          // Read input element value, write UTF-8 to destPtr. Returns byte length.
          if (!wardNodes || !wasmMem) return 0;
          try {
            const el = wardNodes.get(nodeId);
            if (!el || !el.value) return 0;
            const bytes = new TextEncoder().encode(el.value);
            const copyLen = Math.min(bytes.length, destMaxLen);
            new Uint8Array(wasmMem.buffer).set(bytes.subarray(0, copyLen), destPtr);
            return copyLen;
          } catch(e) { return 0; }
        },
        quire_download_text(dataPtr, dataLen, namePtr, nameLen) {
          // Download text data as a file. Creates blob URL + <a download> click.
          if (!wasmMem) return;
          try {
            const mem = new Uint8Array(wasmMem.buffer);
            const text = new TextDecoder().decode(mem.slice(dataPtr, dataPtr + dataLen));
            const name = new TextDecoder().decode(mem.slice(namePtr, namePtr + nameLen));
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          } catch(e) {}
        },
        quire_create_blob_url(dataPtr, dataLen, mimePtr, mimeLen, destPtr, destMaxLen) {
          // Create blob URL from WASM memory data, write URL string to destPtr.
          // Returns URL string byte length (0 on error).
          if (!wasmMem) return 0;
          try {
            const mem = new Uint8Array(wasmMem.buffer);
            const mime = new TextDecoder().decode(mem.slice(mimePtr, mimePtr + mimeLen));
            const bytes = new Uint8Array(mem.slice(dataPtr, dataPtr + dataLen));
            const blob = new Blob([bytes], { type: mime });
            const url = URL.createObjectURL(blob);
            const urlBytes = new TextEncoder().encode(url);
            const copyLen = Math.min(urlBytes.length, destMaxLen);
            new Uint8Array(wasmMem.buffer).set(urlBytes.subarray(0, copyLen), destPtr);
            return copyLen;
          } catch(e) { return 0; }
        },
        quire_search_book(queryPtr, queryLen, spineCount, callbackId) {
          // Async IDB search: find chapters containing query text.
          // Calls ward_on_callback(callbackId, chapterIdx) for each match,
          // then ward_on_callback(callbackId, -1) when done.
          if (!wasmMem || !wardExports) return;
          try {
            const mem = new Uint8Array(wasmMem.buffer);
            const query = new TextDecoder().decode(mem.slice(queryPtr, queryPtr + queryLen)).toLowerCase();
            if (!query || query.length < 1) {
              wardExports.ward_on_callback(callbackId, -1);
              return;
            }
            const req = indexedDB.open('ward');
            req.onsuccess = () => {
              const db = req.result;
              const tx = db.transaction('kv', 'readonly');
              const store = tx.objectStore('kv');
              const allKeysReq = store.getAllKeys();
              allKeysReq.onsuccess = () => {
                const searchKeys = allKeysReq.result
                  .filter(k => typeof k === 'string' && k.length === 20 && k[16] === 's');
                let pending = searchKeys.length;
                if (pending === 0) {
                  wardExports.ward_on_callback(callbackId, -1);
                  db.close();
                  return;
                }
                searchKeys.forEach(key => {
                  const getReq = store.get(key);
                  getReq.onsuccess = () => {
                    const data = getReq.result;
                    if (data) {
                      const bytes = new Uint8Array(data);
                      const textLen = bytes[0] | (bytes[1]<<8) | (bytes[2]<<16) | (bytes[3]<<24);
                      const runCount = bytes[4] | (bytes[5]<<8);
                      const textStart = 8 + runCount * 4;
                      if (textStart + textLen <= bytes.length) {
                        const text = new TextDecoder().decode(bytes.slice(textStart, textStart + textLen));
                        if (text.includes(query)) {
                          const chIdx = parseInt(key.slice(17), 16);
                          wardExports.ward_on_callback(callbackId, chIdx);
                        }
                      }
                    }
                    pending--;
                    if (pending === 0) {
                      wardExports.ward_on_callback(callbackId, -1);
                      db.close();
                    }
                  };
                });
              };
            };
            req.onerror = () => {
              wardExports.ward_on_callback(callbackId, -1);
            };
          } catch(e) {
            wardExports.ward_on_callback(callbackId, -1);
          }
        }
      }
    });
    wardNodes = nodes;
    wasmMem = exports.memory;
    wardExports = exports;
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
  <div id="build-version" style="position:fixed;bottom:2px;right:4px;font-size:10px;color:#ccc;pointer-events:none">dev</div>
</body>
</html>
