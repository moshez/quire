name: Android Build

on:
  push:
    branches: [main]
  pull_request:

env:
  ATS_VERSION: "0.4.2"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache ATS2 toolchain
        id: cache-ats
        uses: actions/cache@v4
        with:
          path: ~/ATS2-Postiats-int-${{ env.ATS_VERSION }}
          key: ats2-int-${{ env.ATS_VERSION }}-${{ runner.os }}

      - name: Download and build ATS2
        if: steps.cache-ats.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://raw.githubusercontent.com/ats-lang/ats-lang.github.io/master/FROZEN000/ATS-Postiats/ATS2-Postiats-int-${{ env.ATS_VERSION }}.tgz" -o /tmp/ats2.tgz
          tar -xzf /tmp/ats2.tgz -C ~
          cd ~/ATS2-Postiats-int-${{ env.ATS_VERSION }}
          ./configure
          make -j$(nproc) -C src/CBOOT patsopt

      - name: Install WASM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Build quire.wasm
        run: |
          export PATSHOME=$HOME/ATS2-Postiats-int-${{ env.ATS_VERSION }}
          make PATSOPT="PATSHOME=$PATSHOME $PATSHOME/src/CBOOT/patsopt"
          test -f build/quire.wasm

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install --no-save @capacitor/cli

      - name: Prepare dist directory
        run: |
          mkdir -p dist/assets/fonts dist/vendor/ward/lib
          cp index.html reader.css manifest.json service-worker.js dist/
          cp -r assets/fonts/* dist/assets/fonts/ 2>/dev/null || true
          cp vendor/ward/lib/ward_bridge.mjs dist/vendor/ward/lib/
          cp build/quire.wasm dist/quire.wasm

      - name: Add Android platform
        run: npx cap add android

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      - name: Fix Kotlin dependency conflict and add release signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Force consistent Kotlin stdlib version to fix classpath duplicate
          # and add release signing config
          cat >> android/app/build.gradle << GRADLE
          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword "${KEYSTORE_PASSWORD}"
                      keyAlias "${KEY_ALIAS}"
                      keyPassword "${KEY_PASSWORD}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          GRADLE

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Verify AAB exists
        run: |
          AAB=$(find android -name "*.aab" | head -1)
          test -n "$AAB" && test -s "$AAB"
          echo "AAB: $AAB ($(stat -c%s "$AAB") bytes)"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab
